<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | RecipeRadar</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body class="page signup-page">
    <nav class="top-nav">
        <div id="brand-name" class="brand">RecipeRadar</div>
        <div class="menu">
            <a class="back-icon-btn icon-only-back-btn" href="Homepage.html" aria-label="Go back" title="Go back" onclick="if(window.history.length > 1){ window.history.back(); return false; }"></a>
            <button type="button" class="hamburger-btn" aria-label="Open menu" title="Menu">&#9776;</button>
            <div class="hamburger-menu">
                <span class="menu-account-item">Account</span>
                <a id="logout-link" class="hidden logout-item" href="#"><span aria-hidden="true">&#128274;</span> Logout</a>
                <a href="contact.html">Contact Us</a>
                <a href="about.html">About</a>
            </div>
        </div>
    </nav>

    <main class="panel form-panel">
        <h1>Create Account</h1>
        <p class="subtitle">Start your account in less than a minute</p>
        <p id="signup-error" class="error-msg hidden">Passwords do not match.</p>

        <form id="signup-form">
            <label for="signup-name">Full Name</label>
            <input id="signup-name" type="text" placeholder="Your full name" required>

            <label for="signup-email">Email</label>
            <input id="signup-email" type="email" placeholder="you@example.com" required>

            <label for="signup-password">Password</label>
            <input id="signup-password" type="password" placeholder="Create a password" required>

            <label for="signup-confirm-password">Confirm Password</label>
            <input id="signup-confirm-password" type="password" placeholder="Re-enter your password" required>

            <label for="signup-language">Preferred Language</label>
            <select id="signup-language" required>
                <option value="" disabled selected>Select your language</option>
                <option value="en">English</option>
                <option value="ar">Arabic</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
            </select>

            <button type="submit">Create Account</button>
        </form>

        <p class="helper-text">Already registered? <a href="login.html">Go to login</a></p>
    </main>

    <script>
        const signupForm = document.getElementById("signup-form");
        const nameInput = document.getElementById("signup-name");
        const emailInput = document.getElementById("signup-email");
        const passwordInput = document.getElementById("signup-password");
        const confirmPasswordInput = document.getElementById("signup-confirm-password");
        const languageInput = document.getElementById("signup-language");
        const errorMessage = document.getElementById("signup-error");

        function getUsers() {
            try {
                return JSON.parse(localStorage.getItem("rrUsers")) || {};
            } catch (error) {
                return {};
            }
        }

        function saveUsers(users) {
            localStorage.setItem("rrUsers", JSON.stringify(users));
        }

        signupForm.addEventListener("submit", function (event) {
            event.preventDefault();

            if (passwordInput.value !== confirmPasswordInput.value) {
                errorMessage.textContent = "Passwords do not match.";
                errorMessage.classList.remove("hidden");
                return;
            }

            const fullName = nameInput.value.trim();
            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;
            const language = languageInput.value || "en";
            const users = getUsers();

            if (users[email]) {
                errorMessage.textContent = "This email is already registered.";
                errorMessage.classList.remove("hidden");
                return;
            }

            users[email] = {
                fullName: fullName || "User",
                email: email,
                password: password,
                language: language,
                photo: "",
                recipes: []
            };

            saveUsers(users);
            localStorage.setItem("preferredLanguage", language);
            errorMessage.classList.add("hidden");
            window.location.href = "login.html?registered=1";
        });
    </script>
    <script src="navbar.js"></script>
</body>
</html>
