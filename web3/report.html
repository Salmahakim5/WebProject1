<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue | RecipeRadar</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body class="page support-page">
    <nav class="top-nav">
        <div id="brand-name" class="brand">RecipeRadar</div>
        <div class="menu">
            <a class="back-icon-btn" href="Homepage.html" aria-label="Go back" title="Go back" onclick="if(window.history.length > 1){ window.history.back(); return false; }">&#8592;</a>
            <a id="home-link" class="hidden" href="Homepage.html">Home</a>
                        <button type="button" class="hamburger-btn" aria-label="Open menu" title="Menu">&#9776;</button>
            <div class="hamburger-menu">
                <span class="menu-account-item">Account</span>
                <a id="logout-link" class="hidden logout-item" href="#"><span aria-hidden="true">&#128274;</span> Logout</a>
                <a href="contact.html">Contact Us</a>
                <a href="about.html">About</a>
            </div>
        </div>
    </nav>

    <main class="panel form-panel">
        <h1>Report an Issue</h1>
        <p class="subtitle">Tell us what happened</p>

        <form id="issue-form">
            <label for="issue-subject">Issue Title</label>
            <input id="issue-subject" type="text" placeholder="Example: Login is not working" required>

            <label for="issue-details">Issue Details</label>
            <textarea id="issue-details" placeholder="Describe your issue here..." required></textarea>

            <button type="submit">Submit Issue</button>
        </form>

        <p id="report-success" class="success-msg hidden">
            Weâ€™ve received your report!<br>
            Thanks for letting us know. Our team is working on it and will contact you soon.
        </p>
    </main>

    <script>
        const brandName = document.getElementById("brand-name");
        const homeLink = document.getElementById("home-link");
        const logoutLink = document.getElementById("logout-link");
        const issueForm = document.getElementById("issue-form");
        const reportSuccess = document.getElementById("report-success");
        const savedUsername = localStorage.getItem("username");
        const isLoggedIn = localStorage.getItem("isLoggedIn") === "1";

        if (isLoggedIn && savedUsername) {
            brandName.textContent = savedUsername;
            const accountItem = document.querySelector(".menu-account-item");
            if (accountItem) {
                accountItem.textContent = "Account: " + savedUsername;
            }
        }

        if (isLoggedIn) {
            homeLink.classList.remove("hidden");
            logoutLink.classList.remove("hidden");
        }

        logoutLink.addEventListener("click", function (event) {
            event.preventDefault();
            localStorage.removeItem("isLoggedIn");
            window.location.href = "login.html";
        });

        issueForm.addEventListener("submit", function (event) {
            event.preventDefault();
            reportSuccess.classList.remove("hidden");
            issueForm.reset();
            setTimeout(function () {
                window.location.href = "Homepage.html";
            }, 1800);
        });
    </script>
    <script src="navbar.js"></script>
</body>
</html>
